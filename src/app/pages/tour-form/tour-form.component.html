<div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="fw-bold mb-3">Create New Tour</h1>
          <p class="text-muted mb-4">
            Enter the basic information for a new tour.
          </p>
  
          <form>
            <div class="mb-3">
              <label class="form-label">Tour name</label>
              <input type="text" class="form-control" placeholder="e.g. Vienna City Walk">
            </div>
  
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" rows="3" placeholder="Short tour description"></textarea>
            </div>
  
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">From</label>
                <input type="text" class="form-control" placeholder="Start location">
              </div>
  
              <div class="col-md-6 mb-3">
                <label class="form-label">To</label>
                <input type="text" class="form-control" placeholder="Destination">
              </div>
            </div>
  
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Transport type</label>
                <select class="form-select">
                  <option>Walking</option>
                  <option>Bike</option>
                  <option>Running</option>
                  <option>Vacation</option>
                </select>
              </div>
  
              <div class="col-md-6 mb-3">
                <label class="form-label">Distance in km</label>
                <input type="number" class="form-control" placeholder="0">
              </div>
            </div>
  
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                Save Tour
              </button>
  
              <a routerLink="/tours" class="btn btn-outline-secondary">
                Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
