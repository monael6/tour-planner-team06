<div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="fw-bold mb-3">Create New Tour</h1>
          <p class="text-muted mb-4">
            Enter the basic information for a new tour.
          </p>
  
          <form (ngSubmit)="saveTour()">
            <div class="mb-3">
              <label class="form-label">Tour name</label>
              <input
                type="text"
                class="form-control"
                name="name"
                [(ngModel)]="tour.name"
                placeholder="e.g. Vienna City Walk"
                required
              >
            </div>
  
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea
                class="form-control"
                rows="3"
                name="description"
                [(ngModel)]="tour.description"
                placeholder="Short tour description"
                required
              ></textarea>
            </div>
  
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">From</label>
                <input
                  type="text"
                  class="form-control"
                  name="from"
                  [(ngModel)]="tour.from"
                  placeholder="Start location"
                  required
                >
              </div>
  
              <div class="col-md-6 mb-3">
                <label class="form-label">To</label>
                <input
                  type="text"
                  class="form-control"
                  name="to"
                  [(ngModel)]="tour.to"
                  placeholder="Destination"
                  required
                >
              </div>
            </div>
  
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Transport type</label>
                <select
                  class="form-select"
                  name="transportType"
                  [(ngModel)]="tour.transportType"
                >
                  <option>Walking</option>
                  <option>Bike</option>
                  <option>Running</option>
                  <option>Vacation</option>
                </select>
              </div>
  
              <div class="col-md-6 mb-3">
                <label class="form-label">Distance in km</label>
                <input
                  type="number"
                  class="form-control"
                  name="distance"
                  [(ngModel)]="tour.distance"
                  placeholder="0"
                  required
                >
              </div>
            </div>
  
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                Save Tour
              </button>
  
              <a routerLink="/tours" class="btn btn-outline-secondary">
                Cancel
              </a>
            </div>
          </form>
  
          <hr>
  
          <h5>Preview</h5>
          <p><strong>Name:</strong> {{ tour.name }}</p>
          <p><strong>From:</strong> {{ tour.from }}</p>
          <p><strong>To:</strong> {{ tour.to }}</p>
          <p><strong>Transport:</strong> {{ tour.transportType }}</p>
          <p><strong>Distance:</strong> {{ tour.distance }} km</p>
        </div>
      </div>
    </div>
  </div>
