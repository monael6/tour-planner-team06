<div class="row mb-4 align-items-center">
    <div class="col">
      <h1 class="fw-bold">My Tours</h1>
      <p class="text-muted">
        Manage your bike, hike, running and vacation tours.
      </p>
    </div>
  
    <div class="col text-end">
      <a routerLink="/tours/new" class="btn btn-primary">
        + Create Tour
      </a>
    </div>
  </div>
  
  <div class="row mb-4">
    <div class="col-md-6">
      <input
        type="text"
        class="form-control"
        placeholder="Search tours..."
        name="searchText"
        [(ngModel)]="searchText"
      >
    </div>
  </div>
  
  <div class="row g-3">
    @for (tour of filteredTours; track tour.name) {
      <div class="col-md-4">
        <app-tour-card
            [tour]="tour"
            (deleteClicked)="deleteTour($event)">
        </app-tour-card>
      </div>
    } @empty {
      <div class="col">
        <div class="alert alert-info">
          No tours found.
        </div>
      </div>
    }
  </div>
