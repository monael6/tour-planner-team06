<div class="form-container">
  <div class="form-card">
    <div class="form-header">
      <h2>{{ isEditMode ? 'Tour bearbeiten' : 'Neue Tour erstellen' }}</h2>
      <p class="text-secondary">
        {{ isEditMode ? 'Aktualisieren Sie die Reisedetails Ihrer Tour.' : 'Tragen Sie die Start- und Zielorte ein. Distanz und Dauer werden automatisch berechnet.' }}
      </p>
    </div>

    <div *ngIf="loading" class="loading-overlay">
      <div class="spinner"></div>
      <p>Speichert Route...</p>
    </div>

    <form (ngSubmit)="saveTour()" #tourForm="ngForm" *ngIf="!loading">
      <div class="form-group">
        <label for="name">Tourname</label>
        <input
          type="text"
          id="name"
          name="name"
          [(ngModel)]="tour.name"
          required
          class="form-control"
          placeholder="z.B. Donauradweg Etappe 1"
        />
      </div>

      <div class="form-group">
        <label for="description">Beschreibung</label>
        <textarea
          id="description"
          name="description"
          [(ngModel)]="tour.description"
          class="form-control"
          rows="3"
          placeholder="Schreiben Sie ein paar Details über diese Tour..."
        ></textarea>
      </div>

      <div class="row">
        <div class="col-md-6 form-group">
          <label for="fromLocation">Startpunkt</label>
          <input
            type="text"
            id="fromLocation"
            name="fromLocation"
            [(ngModel)]="tour.fromLocation"
            required
            class="form-control"
            placeholder="z.B. Wien, Österreich"
          />
        </div>

        <div class="col-md-6 form-group">
          <label for="toLocation">Endpunkt</label>
          <input
            type="text"
            id="toLocation"
            name="toLocation"
            [(ngModel)]="tour.toLocation"
            required
            class="form-control"
            placeholder="z.B. Bratislava, Slowakei"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="transportType">Transportart</label>
        <select
          id="transportType"
          name="transportType"
          [(ngModel)]="tour.transportType"
          required
          class="form-control form-select"
        >
          <option *ngFor="let type of transportTypes" [value]="type">{{ type }}</option>
        </select>
      </div>

      <div class="row" *ngIf="isEditMode">
        <div class="col-md-6 form-group">
          <label>Berechnete Distanz (km)</label>
          <input
            type="text"
            [value]="tour.distance"
            readonly
            class="form-control readonly-input"
          />
        </div>

        <div class="col-md-6 form-group">
          <label>Berechnete Dauer (Minuten)</label>
          <input
            type="text"
            [value]="tour.estimatedTime"
            readonly
            class="form-control readonly-input"
          />
        </div>
      </div>

      <div class="form-actions mt-4 gap-3">
        <button type="submit" [disabled]="!tourForm.valid" class="btn btn-primary">
          {{ isEditMode ? 'Änderungen speichern' : 'Tour erstellen' }}
        </button>
        <a routerLink="/tours" class="btn btn-outline-light">
          Abbrechen
        </a>
      </div>
    </form>
  </div>
</div>
