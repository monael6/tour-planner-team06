<div class="row mb-4 align-items-center">
    <div class="col">
      <h1 class="fw-bold">My Tours</h1>
      <p class="text-muted">
        Manage your bike, hike, running and vacation tours.
      </p>
    </div>
  
    <div class="col text-end">
      <a routerLink="/tours/new" class="btn btn-primary">
        + Create Tour
      </a>
    </div>
  </div>
  
  <div class="row g-3">
    @for (tour of tours; track tour.name) {
      <div class="col-md-4">
        <app-tour-card
          [tour]="tour"
          (deleteClicked)="deleteTour($event)">
        </app-tour-card>
      </div>
    }
  </div>
