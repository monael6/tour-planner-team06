<div class="form-container">
  <div class="form-card">
    <div class="form-header">
      <h2>Logbucheintrag hinzufügen</h2>
      <p class="text-secondary">
        Dokumentieren Sie Ihre gefahrene Tour mit Ihren persönlichen Werten und Kommentaren.
      </p>
    </div>

    <div *ngIf="loading" class="loading-overlay">
      <div class="spinner"></div>
      <p>Speichert Logeintrag...</p>
    </div>

    <form (ngSubmit)="saveLog()" #logForm="ngForm" *ngIf="!loading">
      <div class="form-group">
        <label for="dateTime">Datum & Uhrzeit der Tour</label>
        <input
          type="datetime-local"
          id="dateTime"
          name="dateTime"
          [(ngModel)]="log.dateTime"
          required
          class="form-control"
        />
      </div>

      <div class="form-group">
        <label for="comment">Erfahrungsbericht / Kommentar</label>
        <textarea
          id="comment"
          name="comment"
          [(ngModel)]="log.comment"
          required
          class="form-control"
          rows="3"
          placeholder="Wie war die Strecke? Gab es Besonderheiten?"
        ></textarea>
      </div>

      <div class="row">
        <div class="col-md-6 form-group">
          <label for="difficulty">Schwierigkeit</label>
          <select
            id="difficulty"
            name="difficulty"
            [(ngModel)]="log.difficulty"
            required
            class="form-control form-select"
          >
            <option *ngFor="let diff of difficulties" [value]="diff">{{ diff }}</option>
          </select>
        </div>

        <div class="col-md-6 form-group">
          <label for="rating">Bewertung (1 - 5 Sterne)</label>
          <select
            id="rating"
            name="rating"
            [(ngModel)]="log.rating"
            required
            class="form-control form-select"
          >
            <option [ngValue]="1">1 - Sehr schlecht</option>
            <option [ngValue]="2">2 - Schlecht</option>
            <option [ngValue]="3">3 - Durchschnittlich</option>
            <option [ngValue]="4">4 - Gut</option>
            <option [ngValue]="5">5 - Hervorragend</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 form-group">
          <label for="totalDistance">Tatsächliche Distanz (km)</label>
          <input
            type="number"
            id="totalDistance"
            name="totalDistance"
            [(ngModel)]="log.totalDistance"
            required
            min="0.1"
            step="0.1"
            class="form-control"
            placeholder="z.B. 12.5"
          />
        </div>

        <div class="col-md-6 form-group">
          <label for="totalTime">Tatsächliche Dauer (Minuten)</label>
          <input
            type="number"
            id="totalTime"
            name="totalTime"
            [(ngModel)]="log.totalTime"
            required
            min="1"
            class="form-control"
            placeholder="z.B. 45"
          />
        </div>
      </div>

      <div class="form-actions mt-4 gap-3">
        <button type="submit" [disabled]="!logForm.valid" class="btn btn-primary">
          Log speichern
        </button>
        <a [routerLink]="['/tours', tourId]" class="btn btn-outline-light">
          Abbrechen
        </a>
      </div>
    </form>
  </div>
</div>
