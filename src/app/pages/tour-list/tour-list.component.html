<div class="row mb-4 align-items-center">
    <div class="col">
      <h1 class="fw-bold">My Tours</h1>
      <p class="text-muted">
        Manage your bike, hike, running and vacation tours.
      </p>
    </div>
  
    <div class="col text-end">
      <button class="btn btn-primary">
        + Create Tour
      </button>
    </div>
  </div>
  
  <div class="row g-3">
    @for (tour of tours; track tour.name) {
      <div class="col-md-4">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title">{{ tour.name }}</h5>
  
            <p class="card-text text-muted">
              {{ tour.description }}
            </p>
  
            <ul class="list-group list-group-flush mb-3">
              <li class="list-group-item px-0">From: {{ tour.from }}</li>
              <li class="list-group-item px-0">To: {{ tour.to }}</li>
              <li class="list-group-item px-0">Transport: {{ tour.transportType }}</li>
              <li class="list-group-item px-0">Distance: {{ tour.distance }} km</li>
            </ul>
  
            <button class="btn btn-outline-primary btn-sm">Details</button>
            <button class="btn btn-outline-secondary btn-sm">Edit</button>
            <button class="btn btn-outline-danger btn-sm">Delete</button>
          </div>
        </div>
      </div>
    }
  </div>
